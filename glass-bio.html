<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="description" content="Glass Thanaphon Susiwa — Content Creator" />
  <title>Glass Thanaphon Susiwa</title>

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Google Fonts: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />

  <style>
    /* ============================================================
       BASE
    ============================================================ */
    *, *::before, *::after { box-sizing: border-box; }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      min-height: 100dvh;
      overflow-x: hidden;
      background: #03091a;
      -webkit-font-smoothing: antialiased;
    }

    ::-webkit-scrollbar { width: 0; }

    /* ============================================================
       ANIMATED MESH BACKGROUND
    ============================================================ */
    .bg-mesh {
      position: fixed;
      inset: 0;
      background: #03091a;
      overflow: hidden;
      z-index: 0;
    }

    /* Four slow-drifting colour orbs */
    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(90px);
      opacity: 0.45;
      will-change: transform;
    }

    .orb-1 {
      width: 520px; height: 520px;
      background: radial-gradient(circle, #4338ca 0%, transparent 70%);
      top: -140px; left: -120px;
      animation: orb1 14s ease-in-out infinite alternate;
    }
    .orb-2 {
      width: 480px; height: 480px;
      background: radial-gradient(circle, #0f766e 0%, transparent 70%);
      bottom: -100px; right: -100px;
      animation: orb2 17s ease-in-out infinite alternate;
    }
    .orb-3 {
      width: 380px; height: 380px;
      background: radial-gradient(circle, #7c3aed 0%, transparent 70%);
      top: 45%; left: 50%;
      transform: translate(-50%, -50%);
      animation: orb3 20s ease-in-out infinite alternate;
    }
    .orb-4 {
      width: 300px; height: 300px;
      background: radial-gradient(circle, #0284c7 0%, transparent 70%);
      top: 15%; right: -60px;
      animation: orb4 11s ease-in-out infinite alternate;
    }

    @keyframes orb1 {
      from { transform: translate(0, 0); }
      to   { transform: translate(70px, 90px); }
    }
    @keyframes orb2 {
      from { transform: translate(0, 0); }
      to   { transform: translate(-70px, -50px); }
    }
    @keyframes orb3 {
      from { transform: translate(-50%, -50%) scale(1) rotate(0deg); }
      to   { transform: translate(-50%, -50%) scale(1.25) rotate(20deg); }
    }
    @keyframes orb4 {
      from { transform: translate(0, 0); }
      to   { transform: translate(-50px, 70px); }
    }

    /* Subtle noise texture to break up flat gradients */
    .bg-mesh::after {
      content: '';
      position: absolute;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      opacity: 0.5;
      pointer-events: none;
    }

    /* ============================================================
       GLASSMORPHISM UTILITIES
    ============================================================ */

    /* Standard glass panel */
    .glass {
      background: rgba(255, 255, 255, 0.07);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.12);
      box-shadow:
        0 8px 32px rgba(0, 0, 0, 0.4),
        inset 0 1px 0 rgba(255, 255, 255, 0.1);
    }

    /* Slightly brighter for hover state */
    .glass-hover {
      background: rgba(255, 255, 255, 0.12);
      border-color: rgba(255, 255, 255, 0.2);
      box-shadow:
        0 12px 40px rgba(0, 0, 0, 0.5),
        inset 0 1px 0 rgba(255, 255, 255, 0.18);
    }

    /* ============================================================
       AVATAR GLOW RING
    ============================================================ */
    @keyframes avatar-glow {
      0%, 100% {
        box-shadow:
          0 0 0 2px rgba(255, 255, 255, 0.12),
          0 0 22px rgba(167, 139, 250, 0.35),
          0 0 50px rgba(99, 102, 241, 0.15);
      }
      50% {
        box-shadow:
          0 0 0 2px rgba(255, 255, 255, 0.22),
          0 0 32px rgba(167, 139, 250, 0.55),
          0 0 70px rgba(99, 102, 241, 0.28);
      }
    }

    .avatar-wrap {
      animation: avatar-glow 3.5s ease-in-out infinite;
      border-radius: 9999px;
    }

    /* ============================================================
       LIGHT SWEEP ANIMATION (mirror glare on buttons)
    ============================================================ */
    .btn-sweep {
      position: relative;
      overflow: hidden;
    }

    .btn-sweep::before {
      content: '';
      position: absolute;
      top: 0;
      left: -160%;
      width: 70%;
      height: 100%;
      background: linear-gradient(
        108deg,
        transparent      30%,
        rgba(255,255,255,0.09) 50%,
        transparent      70%
      );
      transform: skewX(-18deg);
      animation: light-sweep 5s ease-in-out infinite;
      animation-delay: var(--sweep-delay, 0s);
    }

    @keyframes light-sweep {
      0%, 55% { left: -160%; }
      100%     { left: 220%; }
    }

    /* ============================================================
       LINK BUTTON INTERACTIONS
    ============================================================ */
    .link-btn {
      transition:
        transform 0.22s cubic-bezier(0.34, 1.56, 0.64, 1),
        background 0.2s ease,
        box-shadow 0.2s ease;
      -webkit-tap-highlight-color: transparent;
    }
    .link-btn:hover  { transform: scale(1.025) translateY(-2px); }
    .link-btn:hover  { background: rgba(255,255,255,0.11); border-color: rgba(255,255,255,0.2); }
    .link-btn:active { transform: scale(0.975); }

    .icon-btn {
      transition:
        transform 0.22s cubic-bezier(0.34, 1.56, 0.64, 1),
        background 0.2s ease;
      -webkit-tap-highlight-color: transparent;
    }
    .icon-btn:hover  { transform: scale(1.1) translateY(-3px); background: rgba(255,255,255,0.14); }
    .icon-btn:active { transform: scale(0.9); }

    /* ============================================================
       ENTRY ANIMATIONS
    ============================================================ */
    @keyframes fade-up {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .fade-up {
      opacity: 0;
      animation: fade-up 0.65s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }

    /* ============================================================
       REFLECTION EFFECT (glass floor illusion)
    ============================================================ */
    .reflect-wrap {
      position: relative;
    }

    .reflect-wrap::after {
      content: '';
      display: block;
      height: 36px;
      margin-top: 1px;
      border-radius: 0 0 16px 16px;
      background: linear-gradient(
        to bottom,
        rgba(255, 255, 255, 0.04) 0%,
        transparent 100%
      );
      /* Flip vertically to simulate reflection */
      transform: scaleY(-1);
      -webkit-mask-image: linear-gradient(to bottom, rgba(0,0,0,0.35) 0%, transparent 100%);
      mask-image: linear-gradient(to bottom, rgba(0,0,0,0.35) 0%, transparent 100%);
      filter: blur(3px);
      pointer-events: none;
    }

    /* ============================================================
       DIVIDER
    ============================================================ */
    .glass-divider {
      height: 1px;
      background: linear-gradient(
        to right,
        transparent,
        rgba(255,255,255,0.12) 30%,
        rgba(255,255,255,0.12) 70%,
        transparent
      );
    }

    /* ============================================================
       MISC
    ============================================================ */
    a { text-decoration: none; }

    /* Verified badge pulse */
    @keyframes badge-pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.7; }
    }
    .badge-pulse { animation: badge-pulse 2.5s ease-in-out infinite; }
  </style>
</head>
